<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>Gift lab</title>
<meta name="theme-color" content="#03060f"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#03060f;--bg1:#060c1a;--bg2:#0a1122;
  --surface:rgba(8,14,28,.92);
  --line:rgba(0,160,255,.12);--line2:rgba(0,160,255,.22);
  --blue:#0a8fff;--blue2:#1ab8ff;--cyan:#00e5ff;--cyan2:#7df4ff;
  --white:#f0f8ff;--muted:rgba(160,210,255,.5);--muted2:rgba(160,210,255,.3);
  --red:#ff3a4e;--green:#00e87a;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px);
  --max-w:460px;
  --font-h:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  min-height:100%;background:var(--bg);color:var(--white);
  font-family:var(--font-b);overflow-x:hidden;overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
body{
  background:
    radial-gradient(ellipse 120% 60% at 50% -5%,rgba(0,120,255,.13),transparent 55%),
    radial-gradient(ellipse 60% 40% at 80% 90%,rgba(0,180,255,.05),transparent 50%),
    var(--bg);
}
button,input{font:inherit;color:inherit;border:none;background:none;cursor:pointer}

/* ── STARS ── */
#cvs{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.45}

/* ── SHELL ── */
.shell{
  position:relative;z-index:1;width:100%;max-width:var(--max-w);margin:0 auto;
  min-height:100dvh;display:flex;flex-direction:column;
  padding:calc(12px + var(--safe-t)) calc(14px + var(--safe-r)) calc(16px + var(--safe-b)) calc(14px + var(--safe-l));
  gap:10px;
}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--font-h);font-size:18px;font-weight:800;letter-spacing:.5px}
.brand-icon{
  width:28px;height:28px;border-radius:9px;flex:none;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  display:grid;place-items:center;font-size:14px;
  box-shadow:0 0 14px rgba(0,180,255,.35);
}
.topbar-r{display:flex;align-items:center;gap:6px}
.bal-pill{
  display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;
  background:rgba(0,120,255,.10);border:1px solid var(--line2);
}
.bal-lbl{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px}
.bal-val{font-family:var(--font-h);font-size:17px;font-weight:800;color:var(--cyan2);letter-spacing:.2px}
.icon-btn{
  width:36px;height:36px;border-radius:9px;
  background:rgba(0,120,255,.10);border:1px solid var(--line);
  display:grid;place-items:center;font-size:15px;
  transition:background .15s,transform .1s;
}
.icon-btn:active{transform:scale(.92)}

/* ── SCENE ── */
.scene-wrap{
  flex:1;min-height:0;position:relative;border-radius:20px;overflow:hidden;
  background:linear-gradient(180deg,#040a18 0%,#020712 100%);
  border:1px solid var(--line);contain:layout paint;
}
.scene-grid{
  position:absolute;bottom:-2px;left:-10%;right:-10%;height:44%;
  background:linear-gradient(rgba(0,160,255,.10) 1px,transparent 1px),
             linear-gradient(90deg,rgba(0,160,255,.10) 1px,transparent 1px);
  background-size:30px 16px;
  transform:perspective(200px) rotateX(72deg);transform-origin:bottom center;
  opacity:.55;pointer-events:none;animation:gridFade 3s ease-in-out infinite;
}
@keyframes gridFade{0%,100%{opacity:.42}50%{opacity:.68}}
.scene-vig{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 80% at 50% 50%,transparent 44%,rgba(2,6,18,.65) 100%);
}
.rocket-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden}
#tCvs{position:absolute;inset:0;pointer-events:none}

/* SVG rocket */
.rocket-svg{
  position:absolute;width:44px;height:58px;transform-origin:50% 65%;will-change:transform;
  filter:drop-shadow(0 0 5px rgba(0,190,255,.45));
  transition:filter .25s,opacity .2s;
}
.rocket-svg.boost{filter:drop-shadow(0 0 12px rgba(0,210,255,.85))}

/* Multiplier */
.multi-wrap{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;padding-bottom:8%;
}
.multi-num{
  font-family:var(--font-h);font-size:clamp(68px,17vw,104px);
  font-weight:900;line-height:.88;letter-spacing:-2px;
  color:var(--white);text-shadow:0 0 36px rgba(0,190,255,.2);
  will-change:transform;animation:mIdle 3s ease-in-out infinite;
  transition:color .15s,text-shadow .15s;
}
.multi-num.flying{animation:mPulse 1.1s ease-in-out infinite;text-shadow:0 0 55px rgba(0,200,255,.42),0 0 18px rgba(0,200,255,.55)}
.multi-num.crash{animation:none;color:var(--red);text-shadow:0 0 48px rgba(255,40,60,.58)}
.multi-num.cashed{animation:none;color:var(--green);text-shadow:0 0 44px rgba(0,230,120,.5)}
@keyframes mIdle{0%,100%{transform:scale(1)}50%{transform:scale(1.007)}}
@keyframes mPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.016)}}
.multi-sub{text-align:center;margin-top:7px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);font-weight:600}

/* Phase badge */
.phase-badge{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  padding:4px 10px;border-radius:99px;
  background:rgba(0,80,150,.28);border:1px solid var(--line);
  font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;
  pointer-events:none;transition:color .2s,background .2s;white-space:nowrap;
}
.phase-badge.live{background:rgba(0,200,80,.12);border-color:rgba(0,200,80,.22);color:rgba(110,255,165,.8)}
.phase-badge.crash{background:rgba(255,40,60,.12);border-color:rgba(255,40,60,.22);color:rgba(255,130,140,.8)}

/* Crash flash */
.crash-flash{
  position:absolute;inset:0;pointer-events:none;opacity:0;z-index:10;
  background:radial-gradient(ellipse at center,rgba(255,50,65,.22) 0%,transparent 68%);
}
.crash-flash.show{animation:cFlash .55s ease-out forwards}
@keyframes cFlash{0%{opacity:1}100%{opacity:0}}

/* History pills */
.history-strip{
  position:absolute;bottom:10px;left:10px;right:10px;
  display:flex;gap:6px;overflow:hidden;pointer-events:none;
}
.h-pill{
  flex:none;padding:5px 9px;border-radius:7px;
  font-family:var(--font-h);font-size:13px;font-weight:700;
  background:rgba(0,100,180,.18);border:1px solid rgba(0,150,255,.14);color:rgba(140,200,255,.7);
  animation:pillIn .24s ease both;
}
.h-pill.live{background:rgba(0,200,80,.14);border-color:rgba(0,200,80,.22);color:rgba(100,255,160,.8)}
.h-pill.mid{background:rgba(0,120,255,.16);border-color:rgba(0,150,255,.22);color:rgba(120,190,255,.85)}
.h-pill.hot{background:rgba(255,175,0,.11);border-color:rgba(255,190,0,.18);color:rgba(255,215,90,.85)}
.h-pill.mega{background:rgba(255,40,60,.14);border-color:rgba(255,50,70,.22);color:rgba(255,135,145,.9)}
@keyframes pillIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}

/* ── PLAYERS STRIP ── */
.players-strip{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  min-height:50px;overflow:hidden;
}
.no-players{font-size:12px;color:var(--muted2);letter-spacing:.3px}
.p-chip{
  flex:none;display:flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:10px;
  background:rgba(0,100,180,.13);border:1px solid var(--line);
  animation:chipIn .22s ease both;
}
.p-chip.won{background:rgba(0,200,80,.11);border-color:rgba(0,200,80,.2)}
.p-chip.lost{background:rgba(255,40,60,.09);border-color:rgba(255,40,60,.17);opacity:.65}
.p-av{font-size:17px;line-height:1}
.p-info{display:flex;flex-direction:column;gap:1px}
.p-bet{font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--white);letter-spacing:.2px}
.p-meta{font-size:10px;color:var(--muted);font-weight:600}
.p-meta.up{color:var(--green)}.p-meta.down{color:var(--red)}
@keyframes chipIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── BET PANEL ── */
.bet-panel{
  flex-shrink:0;background:var(--surface);border:1px solid var(--line);
  border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:11px;
}
.amount-row{
  display:flex;align-items:flex-end;gap:6px;
  padding:10px 12px;border-radius:12px;
  background:rgba(0,80,180,.11);border:1px solid var(--line2);
  transition:border-color .2s;
}
.amount-row:focus-within{border-color:rgba(0,160,255,.38)}
.currency{font-family:var(--font-h);font-size:26px;font-weight:900;color:var(--blue2);line-height:1;padding-bottom:4px;flex:none}
.bet-input{
  flex:1;min-width:0;background:transparent;border:none;outline:none;
  font-family:var(--font-h);font-size:clamp(32px,9.5vw,44px);
  font-weight:900;letter-spacing:-1px;line-height:1;color:var(--white);
}
.bet-input::-webkit-outer-spin-button,.bet-input::-webkit-inner-spin-button{-webkit-appearance:none}
.max-btn{
  flex:none;padding:5px 9px;border-radius:7px;
  background:rgba(0,160,255,.13);border:1px solid var(--line2);
  font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--blue2);text-transform:uppercase;
  transition:background .14s,transform .1s;
}
.max-btn:active{transform:scale(.93)}

.quick-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.q-btn{
  padding:9px 4px;border-radius:9px;
  background:rgba(0,80,150,.15);border:1px solid var(--line);
  font-family:var(--font-h);font-size:14px;font-weight:700;
  color:rgba(150,205,255,.75);letter-spacing:.2px;
  transition:background .14s,color .14s,transform .1s;
}
.q-btn:active{transform:scale(.93)}
.q-btn:hover{background:rgba(0,120,200,.22);color:var(--white)}
.q-btn.action{background:rgba(0,120,255,.11);color:var(--blue2);border-color:rgba(0,150,255,.18)}

/* CTA */
.cta{
  position:relative;overflow:hidden;width:100%;padding:17px;border-radius:13px;
  font-family:var(--font-h);font-size:19px;font-weight:800;letter-spacing:.4px;color:#fff;
  background:linear-gradient(135deg,var(--blue) 0%,#0066dd 100%);
  box-shadow:0 8px 26px rgba(0,120,255,.26),inset 0 1px 0 rgba(255,255,255,.16);
  transition:transform .12s,box-shadow .12s,opacity .14s,background .2s;outline:none;
}
.cta::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.13) 50%,transparent 70%);
  transform:translateX(-120%);animation:shine 3.2s linear infinite;
}
@keyframes shine{to{transform:translateX(130%)}}
.cta:active{transform:scale(.97);box-shadow:0 4px 12px rgba(0,120,255,.2)}
.cta:disabled{
  background:rgba(0,80,150,.22);box-shadow:none;
  color:rgba(100,155,215,.45);cursor:default;
}
.cta:disabled::after{display:none}
.cta.cashout{
  background:linear-gradient(135deg,#006f3a 0%,#00a852 100%);
  box-shadow:0 8px 26px rgba(0,170,80,.26),inset 0 1px 0 rgba(255,255,255,.16);
  animation:ctaPulse .95s ease-in-out infinite;
}
@keyframes ctaPulse{0%,100%{box-shadow:0 8px 26px rgba(0,170,80,.26),inset 0 1px 0 rgba(255,255,255,.16)}50%{box-shadow:0 8px 36px rgba(0,210,90,.42),inset 0 1px 0 rgba(255,255,255,.16)}}
.bet-hint{text-align:center;font-size:12px;color:var(--muted2);letter-spacing:.2px}

/* ── LOADING ── */
.loader{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  background:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(0,100,255,.11),transparent 50%),var(--bg);
  transition:opacity .4s,visibility .4s;
}
.loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.loader-brand{
  font-family:var(--font-h);font-size:28px;font-weight:900;letter-spacing:1px;
  display:flex;align-items:center;gap:10px;
}
.loader-track{width:180px;height:3px;border-radius:99px;background:rgba(0,120,255,.14);overflow:hidden}
.loader-fill{height:100%;width:0%;border-radius:inherit;background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 10px var(--cyan);transition:width .14s ease}
.loader-pct{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--muted);letter-spacing:2px}

/* ── WIN TOAST ── */
.win-toast{
  position:fixed;bottom:calc(26px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(80px);z-index:40;
  width:min(310px,calc(100vw - 36px));
  padding:15px 18px;border-radius:16px;
  background:rgba(0,22,55,.96);border:1px solid rgba(0,200,100,.28);
  box-shadow:0 20px 56px rgba(0,200,100,.18);
  display:flex;align-items:center;gap:13px;
  transition:transform .3s cubic-bezier(.22,.8,.36,1),opacity .3s ease;
  opacity:0;pointer-events:none;
}
.win-toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.win-icon{font-size:26px;flex:none}
.win-info{flex:1}
.win-label{font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.win-amount{font-family:var(--font-h);font-size:26px;font-weight:900;color:var(--white);letter-spacing:-.8px}
.win-at{font-size:11px;color:var(--muted);margin-top:1px}
.win-close{
  width:26px;height:26px;border-radius:7px;flex:none;
  background:rgba(255,255,255,.07);display:grid;place-items:center;
  font-size:13px;color:var(--muted);transition:background .14s;
}
.win-close:active{background:rgba(255,255,255,.13)}

/* Confetti */
.conf-wrap{position:fixed;inset:0;pointer-events:none;z-index:41;overflow:hidden}
.conf-p{
  position:absolute;top:-10px;width:7px;height:9px;border-radius:2px;
  opacity:0;animation:confFall 1.7s ease-in forwards;
}
@keyframes confFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(560deg)}}

/* ── PROFILE SHEET ── */
.sheet-ov{
  position:fixed;inset:0;z-index:30;background:rgba(0,5,15,.68);
  opacity:0;pointer-events:none;transition:opacity .26s;
}
.sheet-ov.show{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;bottom:0;left:50%;z-index:31;
  width:min(var(--max-w),100vw);
  transform:translateX(-50%) translateY(100%);
  transition:transform .3s cubic-bezier(.22,.8,.36,1);
  background:var(--bg1);border:1px solid var(--line);border-radius:22px 22px 0 0;
  padding:0 16px calc(20px + var(--safe-b));
  max-height:86dvh;overflow-y:auto;scrollbar-width:none;
}
.sheet::-webkit-scrollbar{display:none}
.sheet.show{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:34px;height:4px;border-radius:2px;background:rgba(0,120,255,.22);margin:12px auto 16px}
.sheet-ttl{font-family:var(--font-h);font-size:22px;font-weight:800;letter-spacing:.3px;margin-bottom:14px}
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.s-card{border-radius:12px;padding:12px;background:rgba(0,80,160,.11);border:1px solid var(--line)}
.s-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.s-val{font-family:var(--font-h);font-size:23px;font-weight:800;color:var(--white);margin-top:4px;letter-spacing:-.4px}
.s-iw{
  padding:10px 12px;border-radius:11px;margin:4px 0 8px;
  background:rgba(0,80,160,.11);border:1px solid var(--line);
}
.s-iw input{
  width:100%;background:transparent;border:none;outline:none;
  font-family:var(--font-h);font-size:22px;font-weight:700;color:var(--white);letter-spacing:-.3px;
}
.s-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.s-row3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.s-btn{
  padding:12px;border-radius:10px;
  background:rgba(0,80,160,.14);border:1px solid var(--line);
  font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--blue2);letter-spacing:.2px;
  transition:background .14s,transform .1s;
}
.s-btn:active{transform:scale(.95)}
.s-btn.primary{background:rgba(0,120,255,.2);border-color:rgba(0,150,255,.28);color:var(--white)}

/* ── MISC ── */
.scene-shake{animation:sShake .36s ease}
@keyframes sShake{
  0%,100%{transform:translateX(0) translateY(0)}
  16%{transform:translateX(-5px) translateY(2px)}
  32%{transform:translateX(4px) translateY(-1px)}
  48%{transform:translateX(-3px) translateY(1px)}
  64%{transform:translateX(2px)}
}
</style>
</head>
<body>
<canvas id="cvs"></canvas>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-brand"><div class="brand-icon">✦</div>Gift lab</div>
  <div class="loader-track"><div class="loader-fill" id="lFill"></div></div>
  <div class="loader-pct" id="lPct">0%</div>
</div>

<!-- MAIN -->
<div class="shell">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand"><div class="brand-icon">✦</div>Gift lab</div>
    <div class="topbar-r">
      <div class="bal-pill">
        <span class="bal-lbl">BAL</span>
        <span class="bal-val" id="balVal">$100.00</span>
      </div>
      <button class="icon-btn" id="profileBtn" aria-label="Профиль">👤</button>
      <button class="icon-btn" id="hapticBtn" aria-label="Вибрация">⚡</button>
    </div>
  </div>

  <!-- SCENE -->
  <div class="scene-wrap" id="sceneWrap">
    <div class="scene-grid"></div>
    <div class="scene-vig"></div>

    <div class="rocket-layer">
      <canvas id="tCvs"></canvas>

      <!-- SVG ROCKET -->
      <svg class="rocket-svg" id="rSvg" viewBox="0 0 48 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 2 C18 8 14 20 14 34 L34 34 C34 20 30 8 24 2Z" fill="url(#bG)"/>
        <path d="M24 4 C21 9 19 17 18.5 27 L24 25 L29.5 27 C29 17 27 9 24 4Z" fill="rgba(255,255,255,.15)"/>
        <path d="M14 28 L7 42 L14 38Z" fill="url(#fG)"/>
        <path d="M34 28 L41 42 L34 38Z" fill="url(#fG)"/>
        <ellipse cx="24" cy="34.5" rx="7.5" ry="4" fill="url(#nG)"/>
        <ellipse cx="24" cy="35" rx="5.5" ry="2.5" fill="#07111e"/>
        <circle cx="24" cy="20" r="5.5" fill="url(#wG)"/>
        <circle cx="24" cy="20" r="4" fill="url(#wI)"/>
        <circle cx="22.5" cy="18.5" r=".9" fill="rgba(255,255,255,.55)"/>
        <g id="flame">
          <ellipse cx="24" cy="37.5" rx="5" ry="7" fill="url(#flG)" opacity=".92"/>
          <ellipse cx="24" cy="37.5" rx="2.8" ry="4.5" fill="url(#flC)" opacity=".85"/>
        </g>
        <defs>
          <linearGradient id="bG" x1="24" y1="2" x2="24" y2="34" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#92ccff"/><stop offset="50%" stop-color="#4696de"/><stop offset="100%" stop-color="#1555a8"/>
          </linearGradient>
          <linearGradient id="fG" x1="0" y1="28" x2="0" y2="42" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3478d4"/><stop offset="100%" stop-color="#10429c"/>
          </linearGradient>
          <radialGradient id="nG" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#44a0cc"/><stop offset="100%" stop-color="#0c295e"/>
          </radialGradient>
          <radialGradient id="wG" cx="38%" cy="38%" r="62%">
            <stop offset="0%" stop-color="#b0e0ff"/><stop offset="100%" stop-color="#1966aa"/>
          </radialGradient>
          <radialGradient id="wI" cx="38%" cy="34%" r="62%">
            <stop offset="0%" stop-color="#daf4ff"/><stop offset="100%" stop-color="#2e7ec0"/>
          </radialGradient>
          <linearGradient id="flG" x1="24" y1="32" x2="24" y2="46" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffe060"/><stop offset="44%" stop-color="#ff7e1c"/><stop offset="100%" stop-color="rgba(255,50,0,0)"/>
          </linearGradient>
          <linearGradient id="flC" x1="24" y1="32" x2="24" y2="43" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#fffde0"/><stop offset="55%" stop-color="#ffdf90"/><stop offset="100%" stop-color="rgba(255,190,40,0)"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Multiplier -->
    <div class="multi-wrap">
      <div>
        <div class="multi-num" id="mNum">—</div>
        <div class="multi-sub" id="mSub">новый раунд</div>
      </div>
    </div>

    <div class="phase-badge" id="pBadge">Ожидание</div>
    <div class="crash-flash" id="cFlash"></div>
    <div class="history-strip" id="hStrip"></div>
  </div>

  <!-- PLAYERS -->
  <div class="players-strip" id="pStrip">
    <span class="no-players" id="noP">Ставки появятся здесь</span>
  </div>

  <!-- BET -->
  <div class="bet-panel">
    <div class="amount-row">
      <span class="currency">$</span>
      <input class="bet-input" id="bInput" type="number" inputmode="decimal" min="0.01" step="0.01" value="10.00"/>
      <button class="max-btn" id="maxBtn">MAX</button>
    </div>
    <div class="quick-row">
      <button class="q-btn" data-a="1">$1</button>
      <button class="q-btn" data-a="5">$5</button>
      <button class="q-btn" data-a="10">$10</button>
      <button class="q-btn" data-a="25">$25</button>
      <button class="q-btn action" data-act="half">½</button>
      <button class="q-btn action" data-act="x2">×2</button>
      <button class="q-btn action" data-act="all">MAX</button>
      <button class="q-btn action" data-act="x05">÷2</button>
    </div>
    <button class="cta" id="ctaBtn">Сделать ставку</button>
    <div class="bet-hint" id="bHint">Мин. $0.01 · Ставка спишется при подтверждении</div>
  </div>
</div>

<!-- WIN TOAST -->
<div class="win-toast" id="wToast">
  <div class="win-icon">🎯</div>
  <div class="win-info">
    <div class="win-label">Вывод</div>
    <div class="win-amount" id="wAmt">+$0.00</div>
    <div class="win-at" id="wAt">на ×0.00</div>
  </div>
  <button class="win-close" id="wClose">✕</button>
</div>
<div class="conf-wrap" id="confWrap"></div>

<!-- SHEET OVERLAY -->
<div class="sheet-ov" id="shOv"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-ttl">Профиль</div>
  <div class="s-grid">
    <div class="s-card"><div class="s-lbl">Баланс</div><div class="s-val" id="sBal">$100.00</div></div>
    <div class="s-card"><div class="s-lbl">Раундов</div><div class="s-val" id="sRd">0</div></div>
    <div class="s-card"><div class="s-lbl">Лучший вывод</div><div class="s-val" id="sBest">$0.00</div></div>
    <div class="s-card"><div class="s-lbl">Последний взрыв</div><div class="s-val" id="sLast">—</div></div>
  </div>
  <div class="sheet-ttl" style="font-size:16px;margin-top:10px;margin-bottom:8px">Установить баланс</div>
  <div class="s-iw"><input id="sInput" type="number" inputmode="decimal" placeholder="Введите сумму"/></div>
  <div class="s-row2">
    <button class="s-btn primary" id="sApply">Применить</button>
    <button class="s-btn" id="sRestore">Исходный</button>
  </div>
  <div class="s-row3">
    <button class="s-btn" data-set="1000">$1K</button>
    <button class="s-btn" data-set="10000">$10K</button>
    <button class="s-btn" data-set="50000">$50K</button>
  </div>
</div>

<script>
/* ═════ CONFIG ═════ */
const CFG={CRASH_MIN:1.05,CRASH_MAX:11,COUNTDOWN:4,ROUND_GAP:1300,TICK:40};

/* ═════ STATE ═════ */
const S={
  phase:'idle',balance:100,initBal:100,multiplier:1,
  crashPoint:0,countdown:4,hasBet:false,cashedOut:false,
  currentBet:0,round:0,history:[],bestWin:0,lastCrash:null,
  haptics:true,players:[],pathSeed:1,rX:0,rY:0,
  timers:{cd:null,fly:null,restart:null}
};

/* ═════ DOM CACHE ═════ */
const $=id=>document.getElementById(id);
const D={
  loader:$('loader'),lFill:$('lFill'),lPct:$('lPct'),
  balVal:$('balVal'),sceneWrap:$('sceneWrap'),
  tCvs:$('tCvs'),rSvg:$('rSvg'),
  mNum:$('mNum'),mSub:$('mSub'),pBadge:$('pBadge'),
  cFlash:$('cFlash'),hStrip:$('hStrip'),
  pStrip:$('pStrip'),noP:$('noP'),
  bInput:$('bInput'),maxBtn:$('maxBtn'),ctaBtn:$('ctaBtn'),bHint:$('bHint'),
  wToast:$('wToast'),wAmt:$('wAmt'),wAt:$('wAt'),wClose:$('wClose'),confWrap:$('confWrap'),
  profileBtn:$('profileBtn'),hapticBtn:$('hapticBtn'),
  shOv:$('shOv'),sheet:$('sheet'),
  sBal:$('sBal'),sRd:$('sRd'),sBest:$('sBest'),sLast:$('sLast'),
  sInput:$('sInput'),sApply:$('sApply'),sRestore:$('sRestore'),
};

/* ═════ STARS ═════ */
(function(){
  const c=$('cvs'),ctx=c.getContext('2d');let stars=[];
  function rsz(){
    c.width=window.innerWidth;c.height=window.innerHeight;
    stars=Array.from({length:100},()=>({
      x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*.85+.2,ph:Math.random()*Math.PI*2,sp:.0009+Math.random()*.0014
    }));
  }
  function draw(t){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      const a=.28+.44*Math.sin(s.ph+t*s.sp*1000);
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(130,195,255,${a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  rsz();window.addEventListener('resize',rsz);requestAnimationFrame(draw);
})();

/* ═════ TRAIL ═════ */
const tCtx=D.tCvs.getContext('2d');const trail=[];
function resizeTrail(){
  const r=D.sceneWrap.getBoundingClientRect();
  D.tCvs.width=r.width;D.tCvs.height=r.height;
}
function pushTrail(x,y){trail.push({x,y});if(trail.length>55)trail.shift();}
function drawTrail(){
  if(!D.tCvs.width)return;
  tCtx.clearRect(0,0,D.tCvs.width,D.tCvs.height);
  if(trail.length<2)return;
  for(let i=1;i<trail.length;i++){
    const p0=trail[i-1],p1=trail[i],t=i/trail.length;
    tCtx.beginPath();tCtx.moveTo(p0.x,p0.y);tCtx.lineTo(p1.x,p1.y);
    tCtx.strokeStyle=`rgba(0,200,255,${t*.52})`;
    tCtx.lineWidth=t*2.8;tCtx.lineCap='round';tCtx.stroke();
  }
}

/* ═════ SMOKE (rAF-based, no DOM spam) ═════ */
let smokeParticles=[];
function spawnSmoke(x,y){
  if(S.phase!=='flying')return;
  smokeParticles.push({
    x,y:y+18,vx:(Math.random()-.5)*.7,vy:.35+Math.random()*.55,
    life:1,scale:.25+Math.random()*.35
  });
  if(smokeParticles.length>14)smokeParticles.shift();
}
// Smoke drawn on trail canvas for zero extra DOM
function drawSmoke(){
  smokeParticles=smokeParticles.map(p=>({
    ...p,x:p.x+p.vx,y:p.y+p.vy,vy:p.vy+.02,life:p.life-.05,scale:p.scale+.04
  })).filter(p=>p.life>0);
  smokeParticles.forEach(p=>{
    const r=p.scale*12;
    const g=tCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
    g.addColorStop(0,`rgba(180,230,255,${p.life*.35})`);
    g.addColorStop(1,'rgba(0,150,255,0)');
    tCtx.beginPath();tCtx.arc(p.x,p.y,r,0,Math.PI*2);
    tCtx.fillStyle=g;tCtx.fill();
  });
}

/* ═════ HELPERS ═════ */
const r2=(v)=>Math.round(v*100)/100;
const fmt=(v)=>'$'+Number(v).toFixed(2);
const clmp=(v,a,b)=>Math.max(a,Math.min(b,v));
function haptic(t='light'){
  if(!S.haptics||!navigator.vibrate)return;
  const m={light:10,medium:[12,8,14],strong:[28,12,44,12,76]};
  if(m[t])navigator.vibrate(m[t]);
}

/* ═════ ROCKET ═════ */
function updateRocket(mult){
  const W=D.sceneWrap.clientWidth||340;
  const H=D.sceneWrap.clientHeight||220;
  const range=Math.max(.5,(S.crashPoint||2)-1);
  const prog=clmp((mult-1)/range,0,1);
  const seed=S.pathSeed;
  const wave=Math.sin(seed+prog*9)*.045;
  const x=W*(.13+.64*prog+wave);
  const y=H*(.82-.62*prog+Math.cos(seed*.7+prog*6)*.055);
  const angle=-22+prog*38+wave*55;
  D.rSvg.style.left=x+'px';D.rSvg.style.top=y+'px';
  D.rSvg.style.transform=`translate(-50%,-50%) rotate(${angle}deg)`;
  S.rX=x;S.rY=y;
  if(S.phase==='flying'){pushTrail(x,y);spawnSmoke(x,y);}
}

/* ═════ SYNC UI ═════ */
function syncBal(){
  const v=fmt(S.balance);
  D.balVal.textContent=v;D.sBal.textContent=v;
}
function syncSheet(){
  D.sBal.textContent=fmt(S.balance);D.sRd.textContent=String(S.round);
  D.sBest.textContent=fmt(S.bestWin);
  D.sLast.textContent=S.lastCrash?S.lastCrash.toFixed(2)+'x':'—';
}
function setMulti(txt,sub,state){
  D.mNum.textContent=txt;D.mSub.textContent=sub;
  D.mNum.classList.remove('flying','crash','cashed');
  if(state)D.mNum.classList.add(state);
}
function applyPhase(){
  D.pBadge.classList.remove('live','crash');
  if(S.phase==='flying'){D.pBadge.textContent='🔴 LIVE';D.pBadge.classList.add('live');}
  else if(S.phase==='crash'){D.pBadge.textContent='💥 ВЗРЫВ';D.pBadge.classList.add('crash');}
  else if(S.phase==='countdown'){D.pBadge.textContent='⏱ '+S.countdown;}
  else D.pBadge.textContent='Ожидание';
}
function renderHistory(){
  const lbl={idle:'Ждём',countdown:'Старт '+S.countdown,flying:'Полёт',crash:'Взрыв'}[S.phase]||'—';
  let h=`<div class="h-pill live">${lbl}</div>`;
  S.history.slice(0,6).forEach(v=>{
    const c=v>=10?'mega':v>=4?'hot':v>=2?'mid':'';
    h+=`<div class="h-pill ${c}">${v.toFixed(2)}x</div>`;
  });
  D.hStrip.innerHTML=h;
}
function renderPlayers(){
  if(!S.players.length){
    D.pStrip.innerHTML='';D.pStrip.appendChild(D.noP);return;
  }
  let h='';
  S.players.forEach((p,i)=>{
    const sc=p.status==='cashed'?'won':p.status==='lost'?'lost':'';
    const mc=p.status==='cashed'?'up':p.status==='lost'?'down':'';
    const mt=p.status==='cashed'?'×'+p.cashAt.toFixed(2)
             :p.status==='lost'?'взрыв'
             :S.phase==='flying'?'×'+S.multiplier.toFixed(2):'принята';
    h+=`<div class="p-chip ${sc}" style="animation-delay:${i*28}ms">
      <div class="p-av">${p.avatar}</div>
      <div class="p-info"><div class="p-bet">${fmt(p.bet)}</div>
      <div class="p-meta ${mc}">${mt}</div></div></div>`;
  });
  D.pStrip.innerHTML=h;
}
function syncCTA(){
  const btn=D.ctaBtn;btn.classList.remove('cashout');btn.disabled=false;
  if(S.phase==='idle'||S.phase==='countdown'){
    btn.textContent=S.hasBet?'✓ Ставка принята':'Сделать ставку';
    btn.disabled=!!S.hasBet;
    D.bHint.textContent=S.hasBet?'Ставка будет в игре с раундом':'Мин. $0.01 · Ставка спишется при подтверждении';
  } else if(S.phase==='flying'){
    if(S.hasBet&&!S.cashedOut){
      btn.classList.add('cashout');
      btn.textContent='💰 Забрать ×'+S.multiplier.toFixed(2);
      D.bHint.textContent='Нажми, пока не взорвалось!';
    } else {
      btn.disabled=true;
      btn.textContent=S.cashedOut?'✓ Выведено':'Раунд идёт';
      D.bHint.textContent=S.cashedOut?'Следующая ставка — в новом раунде':'';
    }
  } else {
    btn.disabled=true;btn.textContent='Подождите…';D.bHint.textContent='';
  }
}

/* ═════ BET INPUT ═════ */
function getBet(){return r2(Math.max(0,parseFloat(D.bInput.value)||0));}
function setBet(v){D.bInput.value=r2(Math.max(.01,v)).toFixed(2);}

/* ═════ PLACE BET ═════ */
function placeBet(){
  if(S.phase!=='idle'&&S.phase!=='countdown')return;
  if(S.hasBet)return;
  const amt=getBet();
  if(amt<=0){haptic('light');return;}
  if(amt>S.balance){setMulti('Мало!','пополни баланс','');setTimeout(()=>setMulti('—','новый раунд',''),900);haptic('medium');return;}
  S.currentBet=amt;S.hasBet=true;S.cashedOut=false;
  S.balance=r2(S.balance-amt);
  S.players=[{id:'me',avatar:'🧑‍🚀',bet:amt,status:'active',cashAt:0,win:0}];
  syncBal();renderPlayers();syncCTA();haptic('light');
}

/* ═════ CASH OUT ═════ */
function cashOut(){
  if(S.phase!=='flying')return;
  if(!S.hasBet||S.cashedOut)return;
  const me=S.players.find(p=>p.id==='me');if(!me)return;
  me.status='cashed';me.cashAt=r2(S.multiplier);me.win=r2(me.bet*me.cashAt);
  S.cashedOut=true;S.balance=r2(S.balance+me.win);S.bestWin=Math.max(S.bestWin,me.win);
  syncBal();renderPlayers();syncCTA();haptic('medium');
  setMulti(S.multiplier.toFixed(2)+'x','вывод успешен','cashed');
  showWin(me.win,me.cashAt);
}

/* ═════ WIN TOAST ═════ */
let wTimer=null;
function showWin(sum,mult){
  D.wAmt.textContent='+'+fmt(sum);D.wAt.textContent='на ×'+mult.toFixed(2);
  D.wToast.classList.add('show');spawnConf();
  clearTimeout(wTimer);wTimer=setTimeout(closeWin,4200);
}
function closeWin(){D.wToast.classList.remove('show');D.confWrap.innerHTML='';}
function spawnConf(){
  const cols=['#00e5ff','#0a8fff','#fff','#00e87a','#7df4ff'];
  let h='';
  for(let i=0;i<22;i++){
    const l=Math.random()*100,d=1.2+Math.random()*1.4,del=Math.random()*.28;
    h+=`<div class="conf-p" style="left:${l}%;background:${cols[i%cols.length]};animation-duration:${d}s;animation-delay:${del}s;border-radius:${Math.random()>.5?'50%':'2px'}"></div>`;
  }
  D.confWrap.innerHTML=h;
}

/* ═════ CRASH FX ═════ */
function doCrashFX(){
  D.cFlash.classList.remove('show');void D.cFlash.offsetWidth;D.cFlash.classList.add('show');
  D.sceneWrap.classList.remove('scene-shake');void D.sceneWrap.offsetWidth;D.sceneWrap.classList.add('scene-shake');
  trail.length=0;smokeParticles=[];drawTrail();
  haptic('strong');
}

/* ═════ TIMERS ═════ */
function clearAll(){
  clearInterval(S.timers.cd);clearInterval(S.timers.fly);clearTimeout(S.timers.restart);
  S.timers.cd=S.timers.fly=S.timers.restart=null;
}

/* ═════ ROUND LOGIC ═════ */
function explode(){
  clearInterval(S.timers.fly);S.timers.fly=null;
  S.phase='crash';S.multiplier=S.crashPoint;S.lastCrash=S.crashPoint;
  S.players=S.players.map(p=>p.status==='cashed'?p:{...p,status:'lost',win:0});
  setMulti(S.crashPoint.toFixed(2)+'x','💥 взрыв','crash');
  D.rSvg.style.opacity='0';D.rSvg.classList.remove('boost');
  applyPhase();renderPlayers();renderHistory();syncCTA();doCrashFX();
  S.history.unshift(S.crashPoint);S.history=S.history.slice(0,10);
  renderHistory();syncSheet();
  S.timers.restart=setTimeout(startRound,CFG.ROUND_GAP);
}

function startFlight(){
  S.phase='flying';S.multiplier=1;S.pathSeed=Math.random()*10+1;
  S.crashPoint=r2(CFG.CRASH_MIN+Math.random()*(CFG.CRASH_MAX-CFG.CRASH_MIN));
  S.players=S.players.map(p=>({...p,status:'active'}));
  D.rSvg.style.opacity='1';D.rSvg.classList.add('boost');
  resizeTrail();trail.length=0;smokeParticles=[];
  setMulti('1.00x','летим…','flying');applyPhase();renderHistory();renderPlayers();syncCTA();
  const t0=performance.now();
  S.timers.fly=setInterval(()=>{
    const el=(performance.now()-t0)/1000;
    let m;
    if(el<1.5) m=1+el*.5;
    else if(el<3) m=1.75+Math.pow(el-1.5,1.2)*.62;
    else m=2.68+Math.pow(el-3,1.28)*.9;
    S.multiplier=r2(m);
    setMulti(S.multiplier.toFixed(2)+'x','летим…','flying');
    updateRocket(S.multiplier);
    // Draw trail + smoke on same canvas frame
    tCtx.clearRect(0,0,D.tCvs.width,D.tCvs.height);
    drawTrail();drawSmoke();
    renderPlayers();syncCTA();
    if(S.multiplier>=S.crashPoint)explode();
  },CFG.TICK);
}

function startCountdown(){
  S.phase='countdown';S.countdown=CFG.COUNTDOWN;
  setMulti('—','приём ставок: '+S.countdown,'');applyPhase();renderHistory();syncCTA();updateRocket(1);
  S.timers.cd=setInterval(()=>{
    S.countdown--;
    if(S.countdown<=0){clearInterval(S.timers.cd);S.timers.cd=null;startFlight();return;}
    setMulti('—','приём ставок: '+S.countdown,'');applyPhase();renderHistory();
  },1000);
}

function startRound(){
  clearAll();closeWin();
  S.phase='idle';S.multiplier=1;S.round++;S.hasBet=false;
  S.cashedOut=false;S.currentBet=0;S.players=[];
  D.rSvg.style.opacity='1';D.rSvg.classList.remove('boost');
  trail.length=0;smokeParticles=[];
  tCtx.clearRect(0,0,D.tCvs.width,D.tCvs.height);
  updateRocket(1);setMulti('—','новый раунд','');applyPhase();
  renderHistory();renderPlayers();syncCTA();syncBal();
  S.timers.restart=setTimeout(startCountdown,1200);
}

/* ═════ LOADING ═════ */
function initLoad(){
  let p=0;
  const iv=setInterval(()=>{
    p+=Math.floor(Math.random()*8)+7;
    if(p>=100){p=100;clearInterval(iv);setTimeout(()=>D.loader.classList.add('hide'),200);}
    D.lFill.style.width=p+'%';D.lPct.textContent=p+'%';
  },130);
}

/* ═════ SHEET ═════ */
function openSheet(){syncSheet();D.shOv.classList.add('show');D.sheet.classList.add('show');}
function closeSheet(){D.shOv.classList.remove('show');D.sheet.classList.remove('show');}

/* ═════ EVENTS ═════ */
D.ctaBtn.addEventListener('click',()=>{
  if(S.phase==='idle'||S.phase==='countdown')placeBet();
  else if(S.phase==='flying')cashOut();
});
D.maxBtn.addEventListener('click',()=>{setBet(S.balance);haptic('light');});
document.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>{setBet(Number(b.dataset.a));haptic('light');}));
document.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>{
  const cur=getBet(),act=b.dataset.act;
  if(act==='half')setBet(Math.max(.01,S.balance/2));
  else if(act==='x2')setBet(Math.max(.01,cur*2||1));
  else if(act==='all')setBet(Math.max(.01,S.balance));
  else if(act==='x05')setBet(Math.max(.01,cur*.5));
  haptic('light');
}));
D.hapticBtn.addEventListener('click',()=>{S.haptics=!S.haptics;D.hapticBtn.textContent=S.haptics?'⚡':'🔇';});
D.wClose.addEventListener('click',closeWin);
D.wToast.addEventListener('click',e=>{if(e.target===D.wToast)closeWin();});
D.profileBtn.addEventListener('click',openSheet);
D.shOv.addEventListener('click',closeSheet);
D.sApply.addEventListener('click',()=>{const v=parseFloat(D.sInput.value);if(Number.isFinite(v)&&v>=0){S.balance=r2(v);syncBal();haptic('medium');}});
D.sRestore.addEventListener('click',()=>{S.balance=S.initBal;syncBal();haptic('medium');});
document.querySelectorAll('[data-set]').forEach(b=>b.addEventListener('click',()=>{S.balance=Number(b.dataset.set);syncBal();haptic('medium');}));

// Prevent Android input zoom
D.bInput.addEventListener('focus',()=>{
  document.querySelector('meta[name=viewport]').setAttribute('content','width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no');
});

window.addEventListener('resize',()=>{resizeTrail();updateRocket(Math.max(1,S.multiplier||1));});
document.addEventListener('visibilitychange',()=>{if(document.hidden&&navigator.vibrate)navigator.vibrate(0);});

/* ═════ BOOT ═════ */
window.addEventListener('load',()=>{
  resizeTrail();updateRocket(1);setMulti('—','новый раунд','');
  applyPhase();renderHistory();renderPlayers();syncCTA();syncBal();
  initLoad();setTimeout(startRound,1900);
});
