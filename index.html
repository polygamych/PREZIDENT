<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <title>TrdMax</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; touch-action: manipulation; }

    :root {
      --sa-top: var(--tg-safe-area-inset-top, 0px);
      --sa-right: var(--tg-safe-area-inset-right, 0px);
      --sa-bottom: var(--tg-safe-area-inset-bottom, 0px);
      --sa-left: var(--tg-safe-area-inset-left, 0px);
      --csa-top: var(--tg-content-safe-area-inset-top, 0px);
      --csa-bottom: var(--tg-content-safe-area-inset-bottom, 0px);

      --g: #00ff88;
      --r: #ff003c;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.5);
      --card-bg: rgba(8, 10, 12, 0.72);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: var(--text);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      perspective: 1200px;
      padding:
        calc(var(--sa-top) + var(--csa-top))
        calc(var(--sa-right))
        calc(var(--sa-bottom) + var(--csa-bottom))
        calc(var(--sa-left));
    }

    /* ─── BACKGROUND ─────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #fx { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    /* Radial color blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    .blob-1 {
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(0,255,136,0.18) 0%, transparent 70%);
      top: -20vw; left: -20vw;
      animation: blobDrift1 14s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(255,0,60,0.14) 0%, transparent 70%);
      bottom: -15vw; right: -15vw;
      animation: blobDrift2 18s ease-in-out infinite alternate;
    }
    .blob-3 {
      width: 40vw; height: 40vw;
      background: radial-gradient(circle, rgba(0,120,255,0.08) 0%, transparent 70%);
      top: 30%; left: 50%;
      animation: blobDrift3 22s ease-in-out infinite alternate;
    }

    @keyframes blobDrift1 {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(15vw, 10vh) scale(1.15); }
    }
    @keyframes blobDrift2 {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(-12vw, -8vh) scale(1.1); }
    }
    @keyframes blobDrift3 {
      0%   { transform: translate(-50%,-50%) scale(0.9); }
      100% { transform: translate(-50%,-50%) scale(1.2); }
    }

    /* Scanline overlay */
    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.85) 100%);
    }

    /* ─── CARD ─────────────────────────────────── */
    .container {
      position: relative;
      z-index: 10;
      width: 340px;
      padding: 32px 28px 28px;
      border-radius: 28px;
      background: var(--card-bg);
      backdrop-filter: blur(60px) saturate(180%);
      -webkit-backdrop-filter: blur(60px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.07);

      /* layered shadows */
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 4px 6px rgba(0,0,0,0.3),
        0 20px 60px rgba(0,0,0,0.55),
        0 60px 120px rgba(0,0,0,0.4),
        0 0 80px rgba(0,255,136,0.06),
        0 0 160px rgba(0,255,136,0.03);

      opacity: 0;
      transform: translateY(48px) scale(0.95) rotateX(4deg);
      animation: cardReveal 1.1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
      transform-style: preserve-3d;
      will-change: transform, opacity;
    }

    @keyframes cardReveal {
      0%   { opacity: 0; transform: translateY(48px) scale(0.95) rotateX(4deg); filter: blur(12px); }
      60%  { opacity: 1; filter: blur(0); }
      80%  { transform: translateY(-4px) scale(1.01) rotateX(-0.5deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); filter: blur(0); }
    }

    /* card float */
    .container.loaded {
      animation: cardReveal 1.1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards,
                 cardFloat 10s ease-in-out 1.4s infinite;
    }

    @keyframes cardFloat {
      0%   { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
      30%  { transform: translateY(-6px) rotateX(1deg) rotateY(-0.8deg); }
      70%  { transform: translateY(-3px) rotateX(-0.5deg) rotateY(1deg); }
      100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
    }

    /* top edge glow line */
    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,136,0.6), rgba(255,255,255,0.3), rgba(0,255,136,0.6), transparent);
      border-radius: 1px;
      animation: topLineShimmer 4s ease-in-out infinite;
    }
    @keyframes topLineShimmer {
      0%,100% { opacity: 0.4; left: 20%; right: 20%; }
      50%      { opacity: 1;   left: 10%; right: 10%; }
    }

    /* bottom glow */
    .container::after {
      content: '';
      position: absolute;
      bottom: -40px; left: 10%; right: 10%; height: 40px;
      background: radial-gradient(ellipse, rgba(0,255,136,0.12) 0%, transparent 70%);
      filter: blur(20px);
      pointer-events: none;
    }

    /* ─── LOGO ─────────────────────────────────── */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeSlideUp 0.7s ease-out 0.7s forwards;
    }

    .logo-icon {
      position: relative;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon-inner {
      width: 14px; height: 14px;
      border: 2px solid rgba(0,255,136,0.8);
      border-radius: 4px;
      transform: rotate(45deg);
      box-shadow: 0 0 20px rgba(0,255,136,0.5), 0 0 40px rgba(0,255,136,0.2);
      animation: iconPulse 3s ease-in-out infinite;
    }
    .logo-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,136,0.15), transparent 70%);
      animation: iconGlow 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { box-shadow: 0 0 20px rgba(0,255,136,0.5), 0 0 40px rgba(0,255,136,0.2); }
      50%      { box-shadow: 0 0 30px rgba(0,255,136,0.8), 0 0 60px rgba(0,255,136,0.35); }
    }
    @keyframes iconGlow {
      0%,100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #00ff88 0%, #ffffff 40%, #ff003c 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoShimmer 8s ease-in-out infinite;
    }
    @keyframes logoShimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ─── STATUS BAR ───────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      margin: 14px 0 18px;
      border-radius: 14px;
      background: rgba(0,255,136,0.04);
      border: 1px solid rgba(0,255,136,0.12);
      opacity: 0;
      animation: fadeSlideUp 0.6s ease-out 0.9s forwards;
    }

    .status-left {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      font-weight: 500;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--g);
      box-shadow: 0 0 8px rgba(0,255,136,0.9), 0 0 16px rgba(0,255,136,0.4);
      flex-shrink: 0;
      animation: dotBlink 2.5s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%,100% { opacity: 1; box-shadow: 0 0 8px rgba(0,255,136,0.9), 0 0 16px rgba(0,255,136,0.4); }
      50%      { opacity: 0.6; box-shadow: 0 0 4px rgba(0,255,136,0.5), 0 0 8px rgba(0,255,136,0.2); }
    }

    .status-right {
      font-size: 10px;
      letter-spacing: 0.4px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }

    /* ─── SUBTITLE ─────────────────────────────── */
    .subtitle {
      text-align: center;
      font-size: 12px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      font-weight: 500;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease-out 0.8s forwards;
    }

    /* ─── DIVIDER ──────────────────────────────── */
    .divider {
      height: 1px;
      margin: 4px 0 22px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1) 30%, rgba(0,255,136,0.2) 50%, rgba(255,255,255,0.1) 70%, transparent);
      opacity: 0;
      animation: fadeIn 0.6s ease-out 1.0s forwards;
    }

    /* ─── BUTTONS ──────────────────────────────── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      opacity: 0;
      animation: fadeSlideUp 0.7s ease-out 1.05s forwards;
    }

    .btn {
      position: relative;
      width: 100%;
      padding: 15px 20px;
      border-radius: 16px;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      overflow: hidden;
      transition:
        transform 0.3s cubic-bezier(0.16,1,0.3,1),
        box-shadow 0.3s ease,
        background 0.3s ease;
      will-change: transform;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.2px;
    }

    /* btn ripple */
    .btn .ripple-layer {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }

    /* Sweep shine */
    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(110deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: skewX(-20deg);
      animation: btnSweep 5s linear infinite;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn:hover::after { opacity: 1; }
    @keyframes btnSweep {
      0%   { left: -100%; }
      100% { left: 150%; }
    }

    /* Primary — Start */
    .btn-primary {
      background: linear-gradient(135deg, rgba(0,255,136,0.18) 0%, rgba(0,255,136,0.07) 50%, rgba(0,180,80,0.08) 100%);
      border: 1px solid rgba(0,255,136,0.35);
      box-shadow:
        0 0 30px rgba(0,255,136,0.18),
        0 0 60px rgba(0,255,136,0.06),
        inset 0 1px 0 rgba(0,255,136,0.25),
        inset 0 0 20px rgba(0,255,136,0.07);
    }
    .btn-primary:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow:
        0 8px 30px rgba(0,255,136,0.3),
        0 0 80px rgba(0,255,136,0.15),
        inset 0 1px 0 rgba(0,255,136,0.4),
        inset 0 0 30px rgba(0,255,136,0.12);
      border-color: rgba(0,255,136,0.55);
    }
    .btn-primary:active { transform: scale(0.97); }

    /* Secondary */
    .btn-secondary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .btn-secondary:hover {
      transform: translateY(-3px) scale(1.01);
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 6px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-secondary:active { transform: scale(0.97); }

    /* Danger (AI button accented red-ish) */
    .btn-ai {
      background: linear-gradient(135deg, rgba(0,120,255,0.12) 0%, rgba(0,80,200,0.06) 100%);
      border: 1px solid rgba(80,150,255,0.25);
      box-shadow:
        0 0 24px rgba(80,120,255,0.12),
        inset 0 1px 0 rgba(80,150,255,0.18);
    }
    .btn-ai:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow:
        0 6px 28px rgba(80,120,255,0.2),
        inset 0 1px 0 rgba(80,150,255,0.3);
      border-color: rgba(80,150,255,0.4);
    }
    .btn-ai:active { transform: scale(0.97); }

    /* btn icon badge */
    .btn-icon {
      margin-right: 8px;
      opacity: 0.9;
      font-size: 15px;
    }

    /* ─── MINI TICKER ──────────────────────────── */
    .ticker-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 20px;
      opacity: 0;
      animation: fadeSlideUp 0.6s ease-out 0.95s forwards;
    }

    .ticker-item {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.4px;
      border: 1px solid transparent;
    }
    .ticker-item.up {
      background: rgba(0,255,136,0.07);
      border-color: rgba(0,255,136,0.2);
      color: rgba(0,255,136,0.9);
    }
    .ticker-item.down {
      background: rgba(255,0,60,0.07);
      border-color: rgba(255,0,60,0.2);
      color: rgba(255,80,80,0.9);
    }
    .ticker-arrow { font-size: 9px; }

    /* ─── FOOTER ──────────────────────────────── */
    .footer {
      margin-top: 18px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.6px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.6s ease-out 1.3s forwards;
    }
    .footer span { color: rgba(255,255,255,0.18); }

    /* ─── KEYFRAMES ────────────────────────────── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ─── PAYWALL / INNER SCREENS ─────────────── */
    .screen {
      max-height: 64vh;
      overflow-y: auto;
      padding-right: 4px;
      animation: screenIn 0.32s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(14px) scale(0.98); filter: blur(4px); }
      to   { opacity: 1; transform: translateY(0) scale(1);  filter: blur(0); }
    }
    .screen::-webkit-scrollbar { width: 4px; }
    .screen::-webkit-scrollbar-thumb {
      background: rgba(0,255,136,0.25);
      border-radius: 4px;
    }

    .scr-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.2px;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .scr-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .scr-badges {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .scr-badge {
      font-size: 10.5px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 999px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
    }
    .scr-badge.g {
      border-color: rgba(0,255,136,0.3);
      background: rgba(0,255,136,0.07);
      color: rgba(0,255,136,0.9);
      box-shadow: 0 0 16px rgba(0,255,136,0.08);
    }
    .scr-badge.r {
      border-color: rgba(255,0,60,0.3);
      background: rgba(255,0,60,0.06);
      color: rgba(255,80,80,0.9);
    }
    .scr-badge.b {
      border-color: rgba(80,150,255,0.3);
      background: rgba(80,150,255,0.06);
      color: rgba(120,180,255,0.9);
    }

    .scr-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .scr-card-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    .scr-list { display: grid; gap: 10px; }

    .scr-item {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: start;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      line-height: 1.45;
    }

    .scr-dot {
      width: 10px; height: 10px;
      margin-top: 3px;
      border-radius: 3px;
      transform: rotate(45deg);
      border: 1px solid rgba(0,255,136,0.45);
      background: rgba(0,255,136,0.08);
      box-shadow: 0 0 12px rgba(0,255,136,0.2);
      flex-shrink: 0;
    }

    .scr-note {
      margin-top: 12px;
      font-size: 11.5px;
      color: rgba(255,255,255,0.4);
      line-height: 1.5;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 10px;
    }

    .scr-actions {
      display: grid;
      gap: 10px;
    }

    .btn-cta {
      background: linear-gradient(135deg, rgba(0,255,136,0.22) 0%, rgba(0,255,136,0.07) 100%);
      border: 1px solid rgba(0,255,136,0.4);
      box-shadow: 0 0 40px rgba(0,255,136,0.2), inset 0 0 20px rgba(0,255,136,0.08);
      text-align: center;
      white-space: normal;
      line-height: 1.25;
      padding: 16px;
    }
    .btn-cta:hover {
      box-shadow: 0 0 60px rgba(0,255,136,0.35), inset 0 0 30px rgba(0,255,136,0.15);
      transform: translateY(-4px) scale(1.02);
      border-color: rgba(0,255,136,0.6);
    }
    .btn-ghost {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.6);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.85);
      transform: translateY(-2px);
    }

    /* ─── REDUCED MOTION ──────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .container, .logo-text, .btn { animation: none !important; }
      .container { opacity: 1; transform: none; }
      .logo-wrap, .subtitle, .status-bar, .ticker-wrap, .btn-group, .footer, .divider { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- BACKGROUND -->
  <div class="bg">
    <canvas id="fx"></canvas>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
  </div>

  <!-- CARD -->
  <div class="container" id="card">

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-icon"><div class="logo-icon-inner"></div></div>
      <div class="logo-text">TrdMax</div>
    </div>

    <!-- SUBTITLE -->
    <div class="subtitle">Premium Trading Platform</div>

    <!-- STATUS -->
    <div class="status-bar">
      <div class="status-left">
        <div class="status-dot"></div>
        System Online
      </div>
      <div class="status-right">Verified · Risk Control</div>
    </div>

    <!-- MINI TICKERS -->
    <div class="ticker-wrap" id="tickerWrap">
      <div class="ticker-item up"><span class="ticker-arrow">▲</span> BTC +2.41%</div>
      <div class="ticker-item down"><span class="ticker-arrow">▼</span> ETH −0.87%</div>
      <div class="ticker-item up"><span class="ticker-arrow">▲</span> SOL +4.12%</div>
    </div>

    <div class="divider"></div>

    <!-- BUTTONS -->
    <div class="btn-group">
      <button class="btn btn-primary" id="btnStart"><span class="btn-icon">▶</span> Начать</button>
      <button class="btn btn-ai" id="btnAI"><span class="btn-icon">✦</span> AI Ассистент</button>
      <button class="btn btn-secondary" id="btnAbout"><span class="btn-icon">◈</span> О проекте</button>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      Compliance · Privacy · Terms<br>
      <span>© TrdMax Platform 2026</span>
    </div>
  </div>

<script>
/* ─── TELEGRAM INIT ───────────────────────────── */
(function() {
  const tg = window.Telegram?.WebApp;
  if (!tg) return;
  try {
    tg.ready(); tg.expand();
    tg.enableVerticalSwipes?.();
    tg.setHeaderColor?.('#000000');
    tg.setBackgroundColor?.('#000000');
    tg.setBottomBarColor?.('#000000');
  } catch(e) {}
})();

/* ─── CARD LOADED CLASS ───────────────────────── */
setTimeout(() => document.getElementById('card')?.classList.add('loaded'), 1200);

/* ─── BACKGROUND FX ENGINE ────────────────────── */
(function FX() {
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');
  let W, H, DPR;
  let t = 0;
  let mx = 0, my = 0;

  const nums = [];
  const particles = [];
  const lines = [];
  let spawnTimer = 0;
  let lineTimer = 0;

  function resize() {
    DPR = Math.min(2.5, window.devicePixelRatio || 1);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(DPR, DPR);
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => {
    mx = (e.clientX / W - 0.5) * 30;
    my = (e.clientY / H - 0.5) * 20;
  });

  /* --- CHART LINES --- */
  function spawnLine() {
    if (lines.length > 4) return;
    const startX = Math.random() * W * 0.2;
    const points = [];
    let x = startX, y = H * (0.3 + Math.random() * 0.4);
    const count = 30 + Math.floor(Math.random() * 40);
    const isUp = Math.random() > 0.45;
    for (let i = 0; i < count; i++) {
      y += (Math.random() - (isUp ? 0.38 : 0.62)) * H * 0.025;
      y = Math.max(H*0.1, Math.min(H*0.9, y));
      x += W / count;
      points.push({x, y});
    }
    lines.push({
      points, life: 0,
      duration: 10000 + Math.random() * 8000,
      color: isUp ? 'rgba(0,255,136,' : 'rgba(255,60,80,',
      progress: 0
    });
  }

  function drawLines(dt) {
    lineTimer += dt;
    if (lineTimer > 3500) { spawnLine(); lineTimer = 0; }

    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    for (let i = lines.length - 1; i >= 0; i--) {
      const ln = lines[i];
      ln.life += dt;
      const prog = ln.life / ln.duration;
      const fade = prog < 0.15 ? prog/0.15 : prog > 0.7 ? 1-(prog-0.7)/0.3 : 1;
      const drawTo = Math.min(1, ln.life / (ln.duration * 0.5));

      if (prog >= 1) { lines.splice(i,1); continue; }

      const endIdx = Math.floor(drawTo * ln.points.length);
      if (endIdx < 2) continue;

      ctx.beginPath();
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = ln.color + (0.5 * fade) + ')';
      ctx.shadowColor = ln.color + '0.7)';
      ctx.shadowBlur = 12;

      ctx.moveTo(ln.points[0].x + mx*0.02, ln.points[0].y + my*0.02);
      for (let j = 1; j < endIdx; j++) {
        ctx.lineTo(ln.points[j].x + mx*0.02, ln.points[j].y + my*0.02);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // area fill
      ctx.globalAlpha = 0.04 * fade;
      ctx.fillStyle = ln.color + '1)';
      ctx.lineTo(ln.points[endIdx-1].x + mx*0.02, H);
      ctx.lineTo(ln.points[0].x + mx*0.02, H);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  /* --- GRID --- */
  function drawGrid() {
    ctx.save();
    ctx.globalAlpha = 0.025;
    ctx.strokeStyle = 'rgba(255,255,255,1)';
    ctx.lineWidth = 1;
    const colW = W / 8, rowH = H / 10;
    for (let x = 0; x <= W; x += colW) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y <= H; y += rowH) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    ctx.restore();
  }

  /* --- FLOATING NUMBERS --- */
  function spawnNum() {
    if (nums.length > 8) return;
    const up = Math.random() > 0.38;
    nums.push({
      x: Math.random() * (W - 80) + 40,
      y: Math.random() * (H - 100) + 50,
      text: (up ? '+' : '−') + (Math.random()*3).toFixed(2) + '%',
      life: 0, duration: 6000 + Math.random() * 4000,
      vy: -0.018 + Math.random() * 0.01,
      up
    });
  }

  function drawNums(dt) {
    spawnTimer += dt;
    if (spawnTimer > 1600) { spawnNum(); spawnTimer = 0; }

    ctx.save();
    ctx.font = '700 13px "Space Grotesk", monospace';
    ctx.globalCompositeOperation = 'screen';

    for (let i = nums.length - 1; i >= 0; i--) {
      const n = nums[i];
      n.life += dt; n.y += n.vy * dt;
      const prog = n.life / n.duration;
      const fade = prog < 0.1 ? prog/0.1 : prog > 0.7 ? 1-(prog-0.7)/0.3 : 1;

      if (prog >= 1) { nums.splice(i,1); continue; }

      ctx.globalAlpha = fade * 0.65;
      ctx.fillStyle = n.up ? 'rgba(0,255,136,1)' : 'rgba(255,80,80,1)';
      ctx.shadowColor  = n.up ? 'rgba(0,255,136,0.8)' : 'rgba(255,60,60,0.8)';
      ctx.shadowBlur = 14 * fade;
      ctx.fillText(n.text, n.x + mx * 0.04, n.y + my * 0.04);
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  /* --- PARTICLES --- */
  function drawParticles(dt) {
    if (Math.random() > 0.93) {
      if (particles.length < 35) particles.push({
        x: Math.random() * W, y: Math.random() * H,
        size: Math.random() * 1.8 + 0.4,
        vy: -(0.015 + Math.random() * 0.04),
        vx: (Math.random() - 0.5) * 0.02,
        life: 0, duration: 5000 + Math.random() * 4000,
        hue: Math.random() > 0.5 ? 150 : 355
      });
    }

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += dt; p.y += p.vy * dt; p.x += p.vx * dt;
      const prog = p.life / p.duration;
      const fade = prog < 0.1 ? prog/0.1 : 1 - prog;

      if (prog >= 1) { particles.splice(i,1); continue; }

      ctx.globalAlpha = fade * 0.5;
      const c = p.hue === 150 ? 'rgba(0,255,136,1)' : 'rgba(255,80,100,1)';
      ctx.fillStyle = c;
      ctx.shadowColor = c; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x + mx*0.015, p.y + my*0.015, p.size, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }

  /* --- EDGE GLOW --- */
  function drawEdgeGlow() {
    const breathe = 0.5 + Math.sin(t * 0.0004) * 0.3;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    const gl = ctx.createLinearGradient(0, 0, W * 0.4, 0);
    gl.addColorStop(0, `rgba(0,255,136,${0.22 * breathe})`);
    gl.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gl; ctx.fillRect(0, 0, W, H);

    const gr = ctx.createLinearGradient(W, 0, W * 0.6, 0);
    gr.addColorStop(0, `rgba(255,0,60,${0.16 * breathe})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);

    ctx.restore();
  }

  /* --- HORIZON SCAN LINE --- */
  function drawScanLine() {
    const y = (Math.sin(t * 0.00025) * 0.5 + 0.5) * H;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const g = ctx.createLinearGradient(0, y - 80, 0, y + 80);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(0.5, 'rgba(0,255,136,0.025)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, y - 80, W, 160);
    ctx.restore();
  }

  let last = performance.now();
  function loop() {
    const now = performance.now();
    const dt = Math.min(now - last, 50);
    last = now; t = now;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    drawGrid();
    drawEdgeGlow();
    drawScanLine();
    drawLines(dt);
    drawParticles(dt);
    drawNums(dt);

    requestAnimationFrame(loop);
  }
  loop();
  spawnLine(); spawnLine();
})();

/* ─── NAVIGATION ──────────────────────────────── */
(function Nav() {
  const card = document.getElementById('card');
  const originalHTML = card.innerHTML;

  function haptic(type = 'light') {
    try { window.Telegram?.WebApp?.HapticFeedback?.impactOccurred?.(type); } catch(e) {}
  }

  function openTG(url) {
    const tg = window.Telegram?.WebApp;
    if (tg?.openTelegramLink) tg.openTelegramLink(url);
    else window.open(url, '_blank');
  }

  function goHome() {
    card.innerHTML = originalHTML;
    bindAll();
  }

  /* ─── SCREENS ─── */
  function screenHTML(opts) {
    const badges = opts.badges.map(b =>
      `<div class="scr-badge ${b.cls||''}">${b.text}</div>`
    ).join('');
    const items = opts.items.map(it =>
      `<div class="scr-item"><div class="scr-dot"></div><div><b>${it.bold}</b> — ${it.text}</div></div>`
    ).join('');
    return `
      <div class="screen">
        <div class="scr-title">${opts.title}</div>
        <div class="scr-sub">${opts.sub}</div>
        <div class="scr-badges">${badges}</div>
        <div class="scr-card">
          <div class="scr-card-title">${opts.cardTitle}</div>
          <div class="scr-list">${items}</div>
          <div class="scr-note">${opts.note}</div>
        </div>
        <div class="scr-actions">
          <button class="btn btn-cta" id="scrPrimary">${opts.primaryLabel}</button>
          <button class="btn btn-ghost" id="scrBack">← Назад</button>
        </div>
      </div>
    `;
  }

  function showPaywall() {

        {text: 'Risk Control'},
        {text: '24/7 Support'},
        {text: 'Limited Access', cls:'r'}
      ],
      cardTitle: 'Что включено',
      items: [
        {bold: 'Сигналы', text: 'вход, цели, стоп, сценарий выхода — с чёткой логикой.'},
        {bold: 'Аналитика', text: 'ежедневный разбор ситуаций на рынке без воды.'},
        {bold: 'Закрытый клуб', text: 'сопровождение, вопросы, корректировки, дисциплина.'},
        {bold: 'Материалы', text: 'обучение — системно, по шагам, под результат.'}
      ],
      note: 'Доступ активируется после подтверждения. Строгая модерация — чтобы качество среды оставалось высоким.',
      primaryLabel: '✉ Написать администратору'
    });
    document.getElementById('scrPrimary')?.addEventListener('click', () => openTG('https://t.me/clivx'));
    document.getElementById('scrBack')?.addEventListener('click', goHome);
  }

  function showAI() {
    haptic('light');
    card.innerHTML = screenHTML({
      title: 'AI Ассистент TrdMax',
      sub: 'Интеллектуальный помощник для анализа рынка и принятия торговых решений.',
      badges: [
        {text: 'AI Powered', cls:'b'},
        {text: 'Market Analysis'},
        {text: 'Risk Metrics'},
        {text: 'Private Access', cls:'r'}
      ],
      cardTitle: 'Возможности',
      items: [
        {bold: 'Анализ ситуации', text: 'разбор рыночного контекста и сценариев.'},
        {bold: 'Подсказки по рискам', text: 'контроль нагрузки и дисциплины.'},
        {bold: 'Сценарное мышление', text: 'альтернативные варианты развития.'},
        {bold: 'Поддержка 24/7', text: 'внутри закрытой среды.'}
      ],
      note: 'AI Ассистент — вспомогательный инструмент. Финальные решения принимаются участником самостоятельно.',
      primaryLabel: '✉ Написать администратору'
    });
    document.getElementById('scrPrimary')?.addEventListener('click', () => openTG('https://t.me/clivx'));
    document.getElementById('scrBack')?.addEventListener('click', goHome);
  }

  function showAbout() {
    haptic('light');
    card.innerHTML = screenHTML({
      title: 'О компании TrdMax',
      sub: 'Премиальная аналитическая платформа с закрытой экосистемой и системным подходом.',
      badges: [
        {text: 'Operational', cls:'g'},
        {text: 'Research'},
        {text: 'Risk Framework'},
        {text: 'Private', cls:'b'}
      ],
      cardTitle: 'Принципы',
      items: [
        {bold: 'Системность', text: 'сценарии, уровни, цели и контроль риска — без угадайки.'},
        {bold: 'Качество среды', text: 'строгая модерация доступа к комьюнити.'},
        {bold: 'Поддержка', text: 'быстрые ответы и сопровождение внутри платформы.'},
        {bold: 'Прозрачность', text: 'понятная логика решений и дисциплина исполнения.'}
      ],
      note: 'TrdMax — продуктовый подход: дизайн, стабильность, регламенты и ответственность за качество.',
      primaryLabel: '✉ Написать в поддержку'
    });
    document.getElementById('scrPrimary')?.addEventListener('click', () => openTG('https://t.me/clivx'));
    document.getElementById('scrBack')?.addEventListener('click', goHome);
  }

  /* ─── TICKER ANIMATION ─── */
  function animateTickers() {
    const tickers = [
      { pair: 'BTC', val: (37000 + Math.random()*5000), prev: null },
      { pair: 'ETH', val: (2400 + Math.random()*600),  prev: null },
      { pair: 'SOL', val: (140 + Math.random()*40),    prev: null }
    ];
    setInterval(() => {
      const wrap = document.getElementById('tickerWrap');
      if (!wrap) return;
      const items = wrap.querySelectorAll('.ticker-item');
      tickers.forEach((tk, i) => {
        const delta = (Math.random() - 0.48) * 0.8;
        tk.prev = tk.val;
        tk.val = Math.max(tk.val * 0.9, tk.val + delta);
        const pct = ((tk.val - tk.prev) / tk.prev * 100).toFixed(2);
        const up = parseFloat(pct) >= 0;
        if (items[i]) {
          items[i].className = 'ticker-item ' + (up ? 'up' : 'down');
          items[i].innerHTML = `<span class="ticker-arrow">${up ? '▲' : '▼'}</span> ${tk.pair} ${up ? '+' : ''}${pct}%`;
        }
      });
    }, 3000);
  }

  function bindAll() {
    document.getElementById('btnStart')?.addEventListener('click', showPaywall);
    document.getElementById('btnAI')?.addEventListener('click', showAI);
    document.getElementById('btnAbout')?.addEventListener('click', showAbout);
    document.getElementById('btnSupport')?.addEventListener('click', () => {
      haptic('light');
      openTG('https://t.me/clivx');
    });
    animateTickers();
  }

  bindAll();

  /* Button press depth effect */
  document.addEventListener('pointerdown', e => {
    const btn = e.target.closest('.btn');
    if (btn) { haptic('light'); }
  });

})();
</script>
